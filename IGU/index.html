<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendado de Turnos</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #f0f0f0;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        h1 {
            margin-bottom: 40px;
            text-align: center;
            font-size: 2.5rem;
            animation: fadeIn 1s ease-in-out;
        }

        .container {
            text-align: center;
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            background: linear-gradient(145deg, #1d1d1d, #292929);
            position: relative;
            overflow: hidden;
        }

        .button {
            background-color: #6200ea;
            color: #fff;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .button:hover {
            background-color: #3700b3;
            transform: translateY(-5px);
        }

        .button:after {
            content: '';
            position: absolute;
            width: 300%;
            height: 300%;
            background: rgba(255, 255, 255, 0.1);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            transition: all 0.5s ease;
            z-index: 0;
            opacity: 0;
        }

        .button:hover:after {
            opacity: 1;
            transform: translate(-50%, -50%) rotate(0deg);
        }

        .button span {
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .button {
                width: 100%;
                padding: 15px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bienvenido al Sistema de Agendado de Turnos</h1>
        <button class="button" onclick="location.href='servicios.html'"><span>Servicios</span></button>
        <button class="button" onclick="location.href='turnos.html'"><span>Turnos</span></button>
    </div>
</body>
</html>
